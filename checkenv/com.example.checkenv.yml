app-id: com.example.checkenv
runtime: org.freedesktop.Platform//23.08
sdk: org.freedesktop.Sdk//23.08
command: checkenv

modules:
  - name: checkenv
    buildsystem: simple
    build-commands:
      - |
        cat > checkenv << 'SCRIPT'
        #!/bin/sh
        echo "在沙箱中:"
        echo "  gcc: $(command -v gcc || echo 未安装)"
        echo "  gdb: $(command -v gdb || echo 未安装)"
        echo "  make: $(command -v make || echo 未安装)"
        echo "  pkg-config: $(command -v pkg-config || echo 未安装)"
        echo "  stdio.h: $(ls /usr/include/stdio.h 2>/dev/null || echo 不存在)"
        SCRIPT
      - chmod +x checkenv
      - install -Dm755 checkenv /app/bin/checkenv
    sources:
      - type: dir
        path: .